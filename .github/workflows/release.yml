name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Configure npm auth
        if: env.NPM_AUTH_TOKEN != ''
        run: |
          printf '@megaeth-labs:registry=https://registry.npmjs.org/\n' > "$HOME/.npmrc"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_AUTH_TOKEN" >> "$HOME/.npmrc"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package release
        run: scripts/package-release.sh --version "$GITHUB_REF_NAME" --skip-build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "artifacts/mega-wallet-cli-$GITHUB_REF_NAME.tar.gz" \
            "artifacts/mega-wallet-cli-$GITHUB_REF_NAME.tar.gz.sha256" \
            "artifacts/mega-wallet-cli-$GITHUB_REF_NAME-install.sh" \
            "artifacts/mega-wallet-cli-$GITHUB_REF_NAME-install.sh.sha256" \
            --verify-tag \
            --title "MegaETH MOSS CLI $GITHUB_REF_NAME" \
            --notes "MegaETH MOSS CLI release $GITHUB_REF_NAME"
